{{- range $index, $ing := .Values.ingresses }}
{{- if $ing.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "beaverdeck.fullname" $ }}{{- if $ing.nameSuffix }}-{{ $ing.nameSuffix }}{{- end }}
  namespace: {{ include "beaverdeck.namespace" $ }}
  labels:
    {{- include "beaverdeck.labels" $ | nindent 4 }}
  {{- with $ing.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $ing.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    {{- range $host := $ing.hosts }}
    - host: {{ $host.host | quote }}
      http:
        paths:
          {{- range $path := $host.paths }}
          - path: {{ $path.path | quote }}
            pathType: {{ default "Prefix" $path.pathType }}
            backend:
              service:
                name: {{ include "beaverdeck.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
  {{- with $ing.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
